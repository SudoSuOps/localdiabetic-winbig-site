<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html,body{margin:0;padding:0;background:#0c0a07;}
  </style>
</helmet>
<div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0c0a07;">
  <x-import component-from-global-scope="LittleBoxShort" from="./animations.jsx ./little-box-short.jsx" hint-size="100%,100%"></x-import>
</div>
</x-dc>

<!-- Narration (ElevenLabs · Brian) synced to the animation playhead. Arms on a tap (browsers block autoplay-with-sound). -->
<audio id="ld-vo" src="./little-box.mp3" preload="auto"></audio>
<button id="ld-sound" type="button" aria-label="Play with sound"
  style="position:fixed;right:14px;bottom:14px;z-index:9;display:flex;align-items:center;gap:8px;font:600 13px/1 'Inter',-apple-system,sans-serif;color:#2B2118;background:#F2B441;border:none;border-radius:999px;padding:11px 16px;box-shadow:0 8px 22px -8px rgba(0,0,0,.6);cursor:pointer;">🔊 Tap for sound</button>
<script>
(function(){
  var a=document.getElementById('ld-vo'), b=document.getElementById('ld-sound'), on=false;
  function stageTime(){ try{ var t=parseFloat(localStorage.getItem('ldbox:t')||'0'); return isFinite(t)?t:null; }catch(e){ return null; } }
  b.addEventListener('click',function(){
    if(on) return; on=true; b.style.display='none';
    a.loop=true;                                  /* narration loops on its own */
    var t=stageTime(); if(t!==null && t>0.4) a.currentTime=t;  /* align to the visual once, then let it flow */
    a.play().catch(function(){});
  });
})();
</script>
</body>
</html>
